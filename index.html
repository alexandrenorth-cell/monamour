<!DOCTYPE html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MONAMOUR | Luxury Experience</title>
    <!-- Tailwind CSS CDN - O segredo do visual impecável -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Cormorant Garamond', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              gold: '#C5A059',
              bone: '#F9F8F6',
              onyx: '#121212',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap');
      body { background-color: #F9F8F6; margin: 0; overflow-x: hidden; }
      /* Custom scrollbar para luxo */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #F9F8F6; }
      ::-webkit-scrollbar-thumb { background: #C5A059; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
